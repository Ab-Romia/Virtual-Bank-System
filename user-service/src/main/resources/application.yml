server:
  port: 8081

spring:
  application:
    name: user-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/vbank_user
    username: ${POSTGRES_USER:vbank}
    password: ${POSTGRES_PASSWORD:vbank_dev_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # Tracing is off by default so the lean core run exports nothing; the
  # observability override sets the sampling probability and OTLP endpoint.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
