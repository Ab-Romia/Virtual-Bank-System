# Virtual Bank System: one file, three profiles.
#   docker compose up --build                              -> core stack (db, broker, services)
#   docker compose --profile observability up --build       -> + tracing/metrics/dashboards
#   docker compose --profile ai up --build                  -> + AI assistant and its vector store
# Services with no `profiles:` key are the core set and always start. Only the
# gateway is published to the host; the services talk to each other on the
# internal network.

name: virtual-bank

services:
  # ---- Core infrastructure -------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vbank-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # :Z relabels for SELinux (Fedora/podman); without it the container cannot read the script.
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vbank} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: vbank-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---- Application services ------------------------------------------------
  user-service:
    build:
      context: .
      args:
        MODULE: user-service
    container_name: vbank-user-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
    depends_on:
      postgres:
        condition: service_healthy

  account-service:
    build:
      context: .
      args:
        MODULE: account-service
    container_name: vbank-account-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: http://user-service:8081/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  transaction-service:
    build:
      context: .
      args:
        MODULE: transaction-service
    container_name: vbank-transaction-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: http://user-service:8081/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  audit-service:
    build:
      context: .
      args:
        MODULE: audit-service
    container_name: vbank-audit-service
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWKS_URI: http://user-service:8081/.well-known/jwks.json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  gateway:
    build:
      context: .
      args:
        MODULE: gateway
    container_name: vbank-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URI: http://user-service:8081
      ACCOUNT_SERVICE_URI: http://account-service:8082
      TRANSACTION_SERVICE_URI: http://transaction-service:8083
      AUDIT_SERVICE_URI: http://audit-service:8085
      JWKS_URI: http://user-service:8081/.well-known/jwks.json
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    depends_on:
      - user-service
      - account-service
      - transaction-service
      - audit-service

volumes:
  postgres-data:
