# Virtual Bank System: one file, three profiles.
#   docker compose up                                   -> core stack (db, broker, services)
#   docker compose --profile observability up            -> + tracing/metrics/dashboards
#   docker compose --profile ai up                       -> + AI assistant and its vector store
# Services with no `profiles:` key are the core set and always start.

name: virtual-bank

services:
  # ---- Core infrastructure -------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vbank-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vbank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vbank_dev_pw}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # :Z relabels for SELinux (Fedora/podman); without it the container cannot read the script.
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vbank} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: vbank-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---- Application services are added per build phase (gateway, user,
  #      account, transaction, audit) once their Dockerfiles exist. -----------

volumes:
  postgres-data:
