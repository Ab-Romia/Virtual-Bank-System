server:
  port: 8083

spring:
  application:
    name: transaction-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/vbank_transaction
    username: ${POSTGRES_USER:vbank}
    password: ${POSTGRES_PASSWORD:vbank_dev_pw}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    # Observe producer sends and listener receives so the trace context rides
    # in the record headers and the trace continues across the broker.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    consumer:
      group-id: transaction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

vbank:
  outbox:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  # Tracing is off by default so the lean core run exports nothing; the
  # observability override sets the sampling probability and OTLP endpoint.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING:0.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
